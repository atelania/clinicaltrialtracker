// ─── SWEEP HELPERS ────────────────────────────────────────────────────────────
async function runSweep(prompt, attempt=0) {
  const res = await fetch("/api/sweep", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt}),
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    const msg = err.error || `HTTP ${res.status}`;
    // Retry on rate limit up to 4 times with 90s wait
    if ((msg.toLowerCase().includes("rate limit") || msg.toLowerCase().includes("too many") || msg.toLowerCase().includes("overloaded")) && attempt < 4) {
      await new Promise(r => setTimeout(r, 90000));
      return runSweep(prompt, attempt + 1);
    }
    throw new Error(msg);
  }
  const data = await res.json();
  const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = text.replace(/```json[\s\S]*?```|```[\s\S]*?```/g,m=>m.replace(/```json|```/g,"")).replace(/```/g,"").trim();
  const match = clean.match(/\[[\s\S]*\]/);
  if (!match) return [];
  try { const p = JSON.parse(match[0]); return Array.isArray(p)?p:[]; } catch { return []; }
}

function dedup(arr) {
  const seen = new Set();
  return arr.filter(r=>{
    const k = `${(r.company||"").toLowerCase().trim()}::${(r.drug||"").toLowerCase().trim()}`;
    if (seen.has(k)) return false; seen.add(k); return true;
  });
}

// ─── SERVER-SIDE STORAGE ──────────────────────────────────────────────────────
async function fetchSaved() {
  try { const r = await fetch("/api/saved"); return r.ok ? r.json() : []; } catch { return []; }
}
async function pushSaved(newItems) {
  try {
    const r = await fetch("/api/saved", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({records:newItems}) });
    return r.ok ? r.json() : newItems;
  } catch { return newItems; }
}
async function clearSaved() {
  try { await fetch("/api/saved", {method:"DELETE"}); } catch {}
}

function LiveRefreshPanel({onSaved}) {
  const [results, setResults] = useState([]);

  const [lastRun, setLastRun] = useState(null);
  const [sweepProgress, setSweepProgress] = useState([]);
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [globalError, setGlobalError] = useState(null);

  async function runRefresh() {
    setLoading(true);
    setGlobalError(null);
    setResults([]);
    setExpandedIdx(null);
    setSweepProgress(SWEEP_QUERIES.map(q=>({label:q.label,icon:q.icon,status:"pending",count:0})));

    // Check server is reachable
    try {
      const hc = await fetch("/api/health");
      if (!hc.ok) throw new Error("Server not reachable");
    } catch(e) {
      setGlobalError("Cannot reach the server. Make sure it is running.");
      setLoading(false);
      return;
    }

    const allResults = [];
    for (let i = 0; i < SWEEP_QUERIES.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 60000)); // 60s gap to stay under rate limit
      setSweepProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"running"}:p));
      try {
        const found = await runSweep(SWEEP_QUERIES[i].prompt);
        allResults.push(...found);
        setSweepProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"done",count:found.length}:p));
      } catch(e) {
        setSweepProgress(prev=>prev.map((p,j)=>j===i?{...p,status:"error",count:0,err:e.message}:p));
      }
    }
    const deduped = dedup(allResults);
    setResults(deduped);
    setLastRun(new Date());
    setLoading(false);
    if (deduped.length > 0) {
      const merged = await pushSaved(deduped);
      if (onSaved) onSaved(merged);
    }
  }

  return (
    <div style={{padding:"0 0 32px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>

          {loading
            ? <><span style={{width:12,height:12,border:"2px solid rgba(255,255,255,0.4)",borderTopColor:"white",borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/>Running sweeps…</>
            : `⟳ Run ${SWEEP_QUERIES.length} Sweeps`}
        </button>
      </div>

      {globalError&&<div style={{background:"#fce4ec",border:"1px solid #e57373",borderRadius:6,padding:"12px 16px",color:"#b71c1c",fontSize:13,marginBottom:16}}><strong>Error:</strong> {globalError}</div>}

      {/* Sweep progress */}
      {sweepProgress.length>0&&(
        <div style={{background:"#f7f9fc",border:"1px solid #dee4ed",borderRadius:6,padding:"16px 18px",marginBottom:20}}>

          <div style={{display:"flex",flexDirection:"column",gap:8}}>

              <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:14,width:20,flexShrink:0}}>{s.icon}</span>

                {s.status==="pending"&&<span style={{fontSize:11,color:"#b0bec5",fontStyle:"italic"}}>waiting…</span>}
                {s.status==="running"&&<span style={{display:"flex",alignItems:"center",gap:5,color:"#1a5276",fontSize:11}}><span style={{width:10,height:10,border:"2px solid #c8d8ec",borderTopColor:"#1a5276",borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/>Searching…</span>}
                {s.status==="done"&&<span style={{fontSize:11,color:s.count>0?"#1a7a4a":"#8a9ab0",fontWeight:700}}>{s.count>0?`✓ ${s.count} found`:"✓ none"}</span>}
                {s.status==="error"&&<span style={{fontSize:11,color:"#c62828"}} title={s.err}>⚠ error</span>}

            ))}
          </div>
          {lastRun&&<div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #dee4ed",fontSize:11,color:"#8a9ab0"}}>Completed {lastRun.toLocaleString()} · {results.length} unique result{results.length!==1?"s":""} after deduplication</div>}
        </div>
      )}

      {!loading&&lastRun&&results.length===0&&(

                      <StatusBadge status={r.status||"Pre-Clinical"}/>
                      <span style={{fontSize:11,color:"#8a9ab0"}}>{r.date}</span>

                const cfg=STATUS_CONFIG[s]||{};
                const active=filterStatus===s;
                return <button key={s} onClick={()=>setFilterStatus(s)} style={{background:active?cfg.bg:"white",color:active?cfg.color:"#4a6080",border:`1px solid ${active?cfg.color:"#c8d8ec"}`,borderRadius:4,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{s} ({counts[s]})</button>;
              })}
            </div>
            {/* Search + sort */}
            <div style={{display:"flex",gap:10,padding:"10px 0 14px",alignItems:"center"}}>
              <input type="text" value={searchText} onChange={e=>setSearchText(e.target.value)} placeholder="Search company, drug, modality, tumor type…" style={{flex:1,padding:"8px 12px",fontSize:13,border:"1px solid #c8d8ec",borderRadius:4,outline:"none",fontFamily:"inherit",color:"#2c3e50"}}/>
              <select value={sortOrder} onChange={e=>setSortOrder(e.target.value)} style={{padding:"8px 12px",fontSize:12,border:"1px solid #c8d8ec",borderRadius:4,fontFamily:"inherit",color:"#4a6080",background:"white",cursor:"pointer"}}>
                <option value="desc">Newest First</option>
                <option value="asc">Oldest First</option>
              </select>
              <span style={{fontSize:12,color:"#8a9ab0",whiteSpace:"nowrap"}}>{filtered.length} record{filtered.length!==1?"s":""}</span>
            </div>
            {/* Table */}
            <div style={{background:"white",border:"1px solid #dee4ed",borderRadius:6,overflow:"hidden",marginBottom:32,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{background:"#1a3a5c",color:"white"}}>
                    {["","Date","Status","Company / Drug","Modality","Tumor Types","Source"].map((h,i)=>(
                      <th key={i} style={{padding:"10px 8px",textAlign:"left",fontSize:11,fontWeight:700,letterSpacing:"0.08em",borderRight:i<6?"1px solid #2a4a6c":"none",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.length===0
                    ? <tr><td colSpan={7} style={{padding:"32px",textAlign:"center",color:"#8a9ab0",fontSize:13}}>No records match your filters.</td></tr>
                    : filtered.map(r=><RecordRow key={r.id} record={r} isExpanded={expandedId===r.id} onToggle={()=>toggle(r.id)}/>)
                  }
                </tbody>
              </table>
            </div>
          </>
        )}
        {activeTab==="live"&&<div style={{paddingTop:24}}><LiveRefreshPanel onSaved={merged=>setSavedRecords(merged)}/></div>}
        {activeTab==="saved"&&<SavedRecordsPanel records={savedRecords} onClear={()=>setSavedRecords([])}/>}
      </div>

      <div style={{borderTop:"1px solid #dee4ed",background:"white",padding:"14px 24px",textAlign:"center",fontSize:11,color:"#8a9ab0",letterSpacing:"0.03em"}}>
        SOLID TUMOR PIPELINE MONITOR · CURATED JAN–MAR 2026 · SOURCES: GLOBENEWSWIRE, PRNEWSWIRE, BUSINESSWIRE, SEC EDGAR, CLINICALTRIALS.GOV
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
